<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin – Football Signup</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="card">
    <h1>Admin</h1>
    <p class="muted">Manage the shared signup list</p>

    <!-- Login -->
    <div id="loginBox" class="joinBox">
      <label class="muted" for="adminPass">Admin password</label>
      <input
        id="adminPass"
        type="password"
        placeholder="Enter password"
        autocomplete="off"
      />
      <button id="loginBtn">Login</button>
      <p id="loginMsg" class="msg"></p>
    </div>

    <!-- Admin panel -->
    <div id="adminPanel" style="display:none;">
      <div class="adminHeader">
        <p class="line">
          <strong>Status:</strong>
          <span class="adminBadge">ADMIN</span>
        </p>
        <p class="line">
          <strong>Players:</strong>
          <span id="countAdmin">0</span>/14
        </p>
      </div>

      <div class="adminActions">
        <button id="resetBtn" class="danger">Reset list</button>
        <p class="muted small">
          Reset clears the list for everyone immediately.
        </p>
      </div>
      
<div class="adminActions">
  <button id="playerDbBtn">Manage Player Database</button>
  <p class="muted small">
    Add, edit, and rate players.
  </p>
</div>

      <h2>Players</h2>
      <ol id="adminList"></ol>

      <p id="adminMsg" class="msg"></p>
    </div>
  </div>

  <script>
  document.getElementById("playerDbBtn").onclick = function () {
    window.location.href = "playerdb.html";
  };
</script>

  <script src="admin.js"></script>
</body>
</html>
