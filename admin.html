<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin – Football Signup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Admin</h1>

    <div id="loginBox" class="joinBox">
      <label class="muted" for="adminPass">Admin password</label>
      <input id="adminPass" type="password" placeholder="Enter password" />
      <button id="loginBtn">Login</button>
      <p id="loginMsg" class="msg"></p>
    </div>

    <div id="adminPanel" style="display:none;">
      <p class="line"><strong>Game date:</strong> <span id="gameDateAdmin"></span></p>

      <button id="resetBtn" style="background:#b00020;">Reset list (clear all)</button>

      <h2>Players (<span id="countAdmin">0</span>/14)</h2>
      <ol id="adminList"></ol>

      <p class="muted">This admin page edits the signup list for the current week.</p>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
