<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Player Database</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="loginBox" style="margin:20px;">
    <h2>Admin Login</h2>
    <input id="adminPass" type="password" placeholder="Enter admin password" />
    <button id="loginBtn">Login</button>
    <p id="loginMsg"></p>
  </div>

  <div id="adminPanel" style="display:none; margin:20px;">
    <h2>Player Database</h2>
    <p id="adminMsg"></p>

    <h3>Add / Edit Player</h3>
    <div style="display:flex; flex-direction:column; gap:8px; max-width:300px;">
      <input id="pName" placeholder="Name" />

      <input id="pPace" type="number" min="1" max="10" placeholder="Pace (1–10)" />
      <input id="pShooting" type="number" min="1" max="10" placeholder="Shooting (1–10)" />
      <input id="pBallControl" type="number" min="1" max="10" placeholder="Ball Control (1–10)" />
      <input id="pPassing" type="number" min="1" max="10" placeholder="Passing (1–10)" />
      <input id="pDefending" type="number" min="1" max="10" placeholder="Defending (1–10)" />
      <input id="pPhysical" type="number" min="1" max="10" placeholder="Physical (1–10)" />

      <textarea id="pNotes" placeholder="Notes (optional)"></textarea>

      <button id="savePlayerBtn">Save Player</button>
      <button id="cancelEditBtn" style="display:none;">Cancel Edit</button>
    </div>

    <h3 style="margin-top:30px;">Players</h3>
    <table border="1" cellpadding="6" style="border-collapse:collapse;">
      <thead>
        <tr>
          <th>Name</th>
          <th>Pace</th>
          <th>Shooting</th>
          <th>Ball Control</th>
          <th>Passing</th>
          <th>Defending</th>
          <th>Physical</th>
          <th>Notes</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="playersTable"></tbody>
    </table>
  </div>

  <script src="js/players.js"></script>
</body>
</html>
