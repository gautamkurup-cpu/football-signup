<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player Database</title>

  <!-- Existing styles -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="playerdb.css" />
</head>

<body>

  <!-- Modern Admin Card -->
  <div class="admin-card">

    <!-- Header Row -->
    <div class="admin-header">
      <h2>Player Database</h2>

      <!-- Search Bar -->
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search players..."
      />

      <!-- Add Player Button -->
      <button 
        class="add-btn" 
        onclick="window.location.href='addplayer.html'"
      >
        + Add New Player
      </button>
    </div>

    <!-- Table Container (scrollable) -->
    <div class="table-container">
      <table id="playerTable">
      <thead>
  <tr>
    <th>#</th>
    <th>Name <span class="sort-icon">⇅</span></th>
    <th>FWD <span class="sort-icon">⇅</span></th>
    <th>MID <span class="sort-icon">⇅</span></th>
    <th>DEF <span class="sort-icon">⇅</span></th>
    <th>GK <span class="sort-icon">⇅</span></th>
    <th>Best Pos <span class="sort-icon">⇅</span></th>
    <th>Edit</th>
    <th>Delete</th>
  </tr>
</thead>
        <tbody id="playerTableBody">
          <!-- JS inserts rows here -->
        </tbody>
      </table>
    </div>

    <!-- Back Button -->
    <button onclick="window.location.href='admin.html'" class="backBtn">
      ← Back to Admin
    </button>

  </div>

  <!-- JS -->
  <script src="playerdb.js"></script>
</body>
</html>
