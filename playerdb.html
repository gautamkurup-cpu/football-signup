<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player Database</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="playerdb.css" />
</head>

<body>
  <div class="card">
    <h1>Player Database</h1>
    <p class="muted">View and manage all registered players</p>

    <!-- Add Player Button -->
    <button onclick="window.location.href='addplayer.html'" 
            class="edit-btn" 
            style="margin-bottom: 20px;">
      + Add New Player
    </button>

    <!-- Player Table -->
    <div id="playerTableContainer" class="playerdb-card">
      <table id="playerTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Control</th>
            <th>Pace</th>
            <th>Shoot</th>
            <th>Pass</th>
            <th>Def</th>
            <th>Work</th>
            <th>GK</th>
            <th>Best Pos</th>
            <th>Overall</th>
            <th>Edit</th>
          </tr>
        </thead>
        <tbody id="playerTableBody">
          <!-- JS inserts rows here -->
        </tbody>
      </table>
    </div>

    <button onclick="window.location.href='admin.html'" class="backBtn">← Back to Admin</button>
  </div>

  <script src="playerdb.js"></script>
</body>
</html>
