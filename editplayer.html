<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Player</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="playerdb.css" />
</head>

<body>
  <div class="card">
    <h1>Edit Player</h1>
    <p class="muted">Update player ratings (1–10, decimals allowed)</p>

    <div class="joinBox">
      <!-- Player Name -->
      <input id="name" placeholder="Player name" />

      <!-- New Rating Inputs -->
      <input id="forward" type="number" step="0.1" min="1" max="10" placeholder="Forward Rating" />
      <input id="mid" type="number" step="0.1" min="1" max="10" placeholder="Midfield Rating" />
      <input id="defence" type="number" step="0.1" min="1" max="10" placeholder="Defence Rating" />
      <input id="gk" type="number" step="0.1" min="1" max="10" placeholder="Goalkeeper Rating" />

      <!-- Save Button -->
      <button id="saveBtn">Save Changes</button>
      <p id="editMsg" class="msg"></p>
    </div>

    <button onclick="window.location.href='playerdb.html'" class="backBtn">
      ← Back to Player Database
    </button>
  </div>

  <script src="editplayer.js"></script>
</body>
</html>
