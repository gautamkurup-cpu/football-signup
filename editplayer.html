<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Player</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="playerdb.css" />
</head>

<body>
  <div class="card">
    <h1>Edit Player</h1>
    <p class="muted">Update player attributes (1–10)</p>

    <div class="joinBox">
      <input id="name" placeholder="Player name" />

      <input id="ballControl" type="number" placeholder="Ball Control" min="1" max="10" />
      <input id="pace" type="number" placeholder="Pace" min="1" max="10" />
      <input id="shooting" type="number" placeholder="Shooting" min="1" max="10" />
      <input id="passing" type="number" placeholder="Passing" min="1" max="10" />
      <input id="defending" type="number" placeholder="Defending" min="1" max="10" />
      <input id="workRate" type="number" placeholder="Work Rate" min="1" max="10" />
      <input id="goalKeeping" type="number" placeholder="Goal Keeping" min="1" max="10" />

      <button id="saveBtn">Save Changes</button>
      <p id="editMsg" class="msg"></p>
    </div>

    <button onclick="window.location.href='playerdb.html'" class="backBtn">← Back to Player Database</button>
  </div>

  <script src="editplayer.js"></script>
</body>
</html>
