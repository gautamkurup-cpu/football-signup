<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join the next game</title>

  <!-- Social sharing / WhatsApp preview -->
<meta property="og:title" content="Join the next game" />
<meta property="og:description" content="Weekly dads' football at The Totteridge Academy. Add your name and join the squad." />
<meta property="og:image" content="https://totteridgefooty.netlify.app/assets/3hammers-logo.png" />
<meta property="og:url" content="https://totteridgefooty.netlify.app/" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/favicon.png">
</head>

<body>
  <div class="club-banner">
  <img src="assets/3hammers-banner.png" alt="3Hammers FC Banner">
</div>
  <div class="card">
    <h1>Join the next game</h1>

    <p class="line">
      <strong>Date:</strong>
      <span id="gameDate"></span>
    </p>

    <p class="line">
      <strong>Location:</strong>
      The Totteridge Academy
    </p>

    <!-- Weather (optional, populated by main.js if present) -->
    <p class="line muted">
      <strong>Weather (3pm):</strong>
      <span id="weatherText">Loading…</span>
    </p>

    <div class="joinBox">
      <label class="muted" for="nameInput">Your name</label>
      <input
        id="nameInput"
        type="text"
        placeholder="Type your name"
        autocomplete="off"
      />
      <button id="joinBtn">Join</button>
      <p id="msg" class="msg"></p>
    </div>

    <h2>
      Players (<span id="count">0</span>/14)
    </h2>
    <p id="scopeInfo" class="muted small" style="margin-top: -6px;"></p>

    <ol id="playersList"></ol>

    <!-- Discreet admin link (Option A) -->
    <p class="muted" style="text-align:center; margin-top:24px;">
      <a href="/admin.html">Admin</a>
    </p>
  </div>

  <script src="main.js"></script>
</body>
</html>
